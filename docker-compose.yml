version: "3.9"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_MODE: mysql
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ai_native
      DB_PASSWORD: ai_native
      DB_NAME: ai_native
    depends_on:
      - db

  db:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ai_native
      MYSQL_USER: ai_native
      MYSQL_PASSWORD: ai_native
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
